<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>very simple transcoder</title>

    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <h1>very simple transcoder</h1>

    <div>
        <label for="path">File Path/URL:</label>
        <input id="path" type="text" placeholder="Enter copyparty file path/URL">
    </div>
    <div>
        <label for="password">Password:</label>
        <input id="password" type="password" placeholder="Enter password">
    </div>
    <div>
        <label for="reencode">Re-encode to h264:</label>
        <input id="reencode" type="checkbox" placeholder="Re-encode to h264">
    </div>


    <button id="submit">Submit</button>

    <script src="main.js"></script>
</body>

</html>
